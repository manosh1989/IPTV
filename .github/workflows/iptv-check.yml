name: IPTV Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download IPTV source
        run: |
          echo "Downloading IPTV list..."
          curl -L -o ro.m3u https://iptv-org.github.io/iptv/countries/ro.m3u

      - name: Validate file exists
        run: |
          if [ -f ro.m3u ]; then
            echo "OK: file exists"
          else
            echo "ERROR: missing file"
            exit 1
          fi

      - name: Show sample
        run: |
          head -n 10 ro.m3u

      - name: Commit updated playlist
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ro.m3u
          git commit -m "update playlist" || echo "no changes"
          git push
