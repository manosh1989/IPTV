name: IPTV Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download IPTV source
        run: |
          echo "Downloading latest IPTV list..."
          curl -L -o ro.m3u https://iptv-org.github.io/iptv/countries/ro.m3u

      - name: Validate file exists
        run: |
          echo "Checking file..."
          if [ -f ro.m3u ]; then
            echo "OK: ro.m3u exists"
          else
            echo "ERROR: file missing"
            exit 1
          fi

      - name: Show sample channels
        run: |
          echo "Sample channels:"
          grep -E "^#EXTINF|^https?://" ro.m3u | head -n 20
