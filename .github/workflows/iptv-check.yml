name: IPTV Builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download latest IPTV list
        run: |
          echo "Downloading IPTV list..."
          curl -L -o ro.m3u https://iptv-org.github.io/iptv/countries/ro.m3u

      - name: Force file update (ensures commit always changes)
        run: |
          echo "# updated: $(date)" >> ro.m3u

      - name: Validate file
        run: |
          echo "Line count:"
          wc -l ro.m3u

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add ro.m3u
          git commit -m "auto update IPTV list" || echo "no changes to commit"
          git push
